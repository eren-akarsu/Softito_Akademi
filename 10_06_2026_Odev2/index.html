<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>JavaScript Metot Örnekleri</title>
</head>
<body>

    <h1>JavaScript Metot Örnekleri</h1>

    <script>

        // map(): Dizideki her elemanı değiştirerek yeni bir dizi oluşturur.
        let sayilar = [1, 2, 3, 4];
        let ikiKat = sayilar.map(sayi => sayi * 2);
        console.log("map:", ikiKat);

        // find(): Koşulu sağlayan ilk elemanı bulur.
        let bulunan = sayilar.find(sayi => sayi > 2);
        console.log("find:", bulunan);

        // reduce(): Dizideki elemanları tek bir değere indirger.
        let toplam = sayilar.reduce((a, b) => a + b, 0);
        console.log("reduce:", toplam);

        // filter(): Koşulu sağlayan elemanları yeni bir diziye aktarır.
        let filtreli = sayilar.filter(sayi => sayi > 2);
        console.log("filter:", filtreli);

        // some(): En az bir elemanın koşulu sağlayıp sağlamadığını kontrol eder.
        let herhangiBiri = sayilar.some(sayi => sayi > 3);
        console.log("some:", herhangiBiri);

        // every(): Tüm elemanların koşulu sağlayıp sağlamadığını kontrol eder.
        let hepsiPozitif = sayilar.every(sayi => sayi > 0);
        console.log("every:", hepsiPozitif);

        // push(): Dizinin sonuna yeni bir eleman ekler.
        let meyveler = ["Elma", "Armut"];
        meyveler.push("Muz");
        console.log("push:", meyveler);

        // includes(): Bir değerin dizide bulunup bulunmadığını kontrol eder.
        console.log("includes:", meyveler.includes("Muz"));

        // toLowerCase(): Metindeki tüm harfleri küçük harfe dönüştürür.
        let buyukYazi = "EREN";
        console.log("toLowerCase:", buyukYazi.toLowerCase());

        // toUpperCase(): Metindeki tüm harfleri büyük harfe dönüştürür.
        let kucukYazi = "eren";
        console.log("toUpperCase:", kucukYazi.toUpperCase());

        // trim(): Metnin başındaki ve sonundaki boşlukları kaldırır.
        let boslukluMetin = "   Merhaba Dünya   ";
        console.log("trim:", boslukluMetin.trim());

        // split(): Bir metni belirtilen karaktere göre parçalayarak diziye dönüştürür.
        let metin = "elma,armut,muz";
        let dizi = metin.split(",");
        console.log("split:", dizi);

        // join(): Dizideki elemanları birleştirerek metin haline getirir.
        let birlestirilmis = dizi.join("-");
        console.log("join:", birlestirilmis);

        // parseFloat(): Metin türündeki ondalıklı sayıyı sayı tipine dönüştürür.
        let sayiMetni = "12.5";
        console.log("parseFloat:", parseFloat(sayiMetni));

        // setInterval(): Belirli zaman aralıklarında bir işlemi tekrar tekrar çalıştırır.
        let intervalId = setInterval(() => {
            console.log("setInterval: Merhaba");
        }, 1000);

        // clearInterval(): setInterval ile başlatılan işlemi durdurur.
        setTimeout(() => {
            clearInterval(intervalId);
            console.log("clearInterval: Interval durduruldu.");
        }, 5000);

    </script>

</body>
</html>S
